name: Football Calendar Sync

on:
  schedule:
    # Corre 4x por dia (a cada 6h): 8h, 14h, 20h, 2h UTC = 9h, 15h, 21h, 3h Lisboa
    - cron: '0 8,14,20,2 * * *'

  # Permite correr manualmente no separador Actions do GitHub
  workflow_dispatch:

# Evita execuções sobrepostas (ex: run manual a meio de um run agendado),
# que poderiam entrar em conflito ao fazer commit do fixtures_state.json.
concurrency:
  group: football-calendar-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necessário para fazer commit do state file

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache de dependências pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Correr sincronização
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python sync.py

      - name: Guardar estado atualizado (commit automático)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fixtures_state.json
          # Só faz commit se o ficheiro tiver mudado
          git diff --staged --quiet || git commit -m "chore: update fixtures state [skip ci]"
          git push
